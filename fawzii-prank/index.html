<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="robots" content="noindex, nofollow">
    <title>fawzii.me — Personal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow: hidden; overscroll-behavior: none; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --------- Landing --------- */
        .landing {
            text-align: center; padding: 2rem; max-width: 500px;
            position: relative; z-index: 1;
        }
        h1 {
            font-size: clamp(2rem, 8vw, 3rem);
            margin-bottom: 0.5rem;
            color: #38bdf8;
            letter-spacing: -0.02em;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-size: clamp(0.95rem, 3vw, 1.1rem);
        }
        .hint {
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }
        #continueBtn {
            background: #38bdf8; color: #0f172a; border: none;
            padding: 0.9rem 2rem; font-size: clamp(1rem, 3.5vw, 1.1rem);
            border-radius: 8px; cursor: pointer; font-weight: 600;
            touch-action: manipulation;
            min-width: 200px;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
        }
        #continueBtn.dodging {
            transition: left 0.25s cubic-bezier(.68,-0.55,.27,1.55),
                        top 0.25s cubic-bezier(.68,-0.55,.27,1.55),
                        background 0.15s;
        }

        /* --------- Red flash --------- */
        .flash {
            display: none; position: fixed; inset: 0;
            background: #dc2626; z-index: 300; pointer-events: none;
        }
        .flash.active { display: block; animation: flashOnce 0.4s forwards; }
        @keyframes flashOnce {
            0%   { opacity: 0.9; }
            100% { opacity: 0; }
        }

        /* --------- Scare (video) --------- */
        .scare {
            display: none; position: fixed; inset: 0;
            background: black; z-index: 100;
            align-items: center; justify-content: center;
            overflow: hidden;
        }
        .scare.active { display: flex; }

        /* Blurred backdrop: same video, muted, scaled to fill screen with heavy
           blur. Hides the ugly upscale of a low-res source (e.g. 240p) while
           keeping a cinematic atmospheric fill. */
        .scare-bg {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(28px) brightness(0.55) saturate(1.4);
            transform: scale(1.15);  /* hide the soft edges of the blur */
            z-index: 1;
            pointer-events: none;
        }

        /* Foreground: the actual video, aspect-preserving, filling most of
           the viewport. object-fit:contain preserves the aspect ratio and
           letterboxes as needed. 92% of the shorter viewport dimension
           leaves a small margin so the blurred backdrop stays visible
           at the edges (cinematic framing effect). */
        #scareVideo {
            position: relative;
            z-index: 2;
            width: 92vw;
            height: 92vh;
            object-fit: contain;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        /* Loader while video buffers */
        .loader {
            display: none;
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: absolute; z-index: 101;
        }
        .scare.active .loader.pending { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --------- Clown message --------- */
        .message {
            display: none; position: fixed; inset: 0;
            background: radial-gradient(circle, #ef4444 0%, #b91c1c 100%);
            color: white; z-index: 200;
            align-items: center; justify-content: center;
            font-weight: 800; text-align: center; padding: 2rem;
            flex-direction: column; gap: 1rem;
        }
        .message.active { display: flex; animation: msgFadeIn 0.3s; }
        @keyframes msgFadeIn {
            from { opacity: 0; transform: scale(0.85); }
            to   { opacity: 1; transform: scale(1); }
        }
        .clown {
            font-size: clamp(4rem, 20vw, 8rem);
            animation: bounce 1s infinite;
        }
        .msg-text {
            font-size: clamp(1.5rem, 7vw, 4rem);
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }
        .msg-sub {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: 400;
            opacity: 0.85;
            margin-top: 1rem;
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0) rotate(0deg); }
            25%     { transform: translateY(-20px) rotate(-10deg); }
            50%     { transform: translateY(-30px) rotate(0deg); }
            75%     { transform: translateY(-20px) rotate(10deg); }
        }
    </style>
</head>
<body>
    <!-- Landing page (looks innocent) -->
    <div class="landing" id="landing">
        <h1>fawzii.me</h1>
        <p class="subtitle">Software engineer &middot; Personal portfolio</p>
        <p class="hint">Get an early preview of what I'm working on</p>
        <button id="continueBtn">Enter Preview &rarr;</button>
    </div>

    <!-- Red flash overlay -->
    <div class="flash" id="flash"></div>

    <!-- Scare video (fullscreen with blurred backdrop) -->
    <div class="scare" id="scare">
        <div class="loader pending" id="loader"></div>
        <!-- Blurred, muted copy that fills the screen -->
        <video class="scare-bg" id="scareBg" playsinline muted preload="auto">
            <source src="scare.mp4" type="video/mp4">
        </video>
        <!-- Actual video with audio, aspect-preserved, centered -->
        <video id="scareVideo" playsinline preload="auto">
            <source src="scare.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Clown message -->
    <div class="message" id="message">
        <div class="clown">&#129313;</div>
        <div class="msg-text">بتعمل ايه هنا يا كلاون؟</div>
        <div class="msg-sub">You just got pranked &mdash; welcome to fawzii.me</div>
    </div>

    <script>
        // ---------------- Config ----------------
        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const MAX_DODGES = isMobile ? 3 : 6;
        const LABELS = [
            'Enter Preview →',
            'Try again 😏',
            'Almost!',
            '🤨 So close',
            'Really?',
            'Fine, catch me',
            'OK you win...'
        ];

        // ---------------- Preload videos ----------------
        const scareVideo = document.getElementById('scareVideo');
        const scareBg    = document.getElementById('scareBg');
        scareVideo.load();
        scareBg.load();

        // ---------------- Dodging button ----------------
        const btn = document.getElementById('continueBtn');
        let dodges = 0;
        let anchored = false;

        function teleport() {
            if (!anchored) {
                const rect = btn.getBoundingClientRect();
                btn.style.position = 'fixed';
                btn.style.left = rect.left + 'px';
                btn.style.top = rect.top + 'px';
                btn.style.margin = '0';
                btn.classList.add('dodging');
                void btn.offsetHeight;  // reflow so first transition works
                anchored = true;
            }

            const padding = 20;
            const btnW = btn.offsetWidth;
            const btnH = btn.offsetHeight;
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const curX = parseFloat(btn.style.left) || 0;
            const curY = parseFloat(btn.style.top) || 0;

            // Pick a spot at least 1/3 viewport away from current
            let newX, newY, tries = 0;
            do {
                newX = padding + Math.random() * (vw - btnW - padding * 2);
                newY = padding + Math.random() * (vh - btnH - padding * 2);
                tries++;
            } while (
                tries < 8 &&
                Math.abs(newX - curX) < vw / 3 &&
                Math.abs(newY - curY) < vh / 3
            );

            btn.style.left = newX + 'px';
            btn.style.top  = newY + 'px';
            btn.textContent = LABELS[Math.min(dodges, LABELS.length - 1)];

            // Cyan → orange as they get closer to catching
            const hue = Math.max(190 - dodges * 8, 20);
            btn.style.background = `hsl(${hue}, 90%, 60%)`;

            if (isMobile && navigator.vibrate) navigator.vibrate(30);
            dodges++;
        }

        // Desktop: dodge on hover
        btn.addEventListener('mouseenter', () => {
            if (dodges < MAX_DODGES) teleport();
        });

        // Mobile: dodge on touchstart (fires before click)
        btn.addEventListener('touchstart', (e) => {
            if (dodges < MAX_DODGES) {
                e.preventDefault();
                teleport();
            }
        }, { passive: false });

        // Click handler (fires only after button "gives up")
        btn.addEventListener('click', () => {
            if (dodges < MAX_DODGES && !isMobile) return;
            triggerPrank();
        });

        // ---------------- Prank flow ----------------
        let clownShown = false;

        function showClownMessage() {
            if (clownShown) return;
            clownShown = true;
            document.getElementById('scare').classList.remove('active');
            document.getElementById('message').classList.add('active');
            if (isMobile && navigator.vibrate) {
                navigator.vibrate([100, 50, 100, 50, 300]);
            }
        }

        function triggerPrank() {
            document.getElementById('landing').style.display = 'none';

            // Red flash first
            const flash = document.getElementById('flash');
            flash.classList.add('active');

            setTimeout(() => {
                flash.classList.remove('active');
                const scare = document.getElementById('scare');
                scare.classList.add('active');

                // Reset + play both videos in sync
                scareBg.currentTime = 0;
                scareBg.muted = true;  // bg is silent, only fg carries audio
                scareVideo.currentTime = 0;
                scareVideo.volume = 1.0;
                scareVideo.muted = false;

                const bgPromise = scareBg.play().catch(() => {});
                const fgPromise = scareVideo.play();

                // Hide loader when video actually starts painting
                scareVideo.addEventListener('playing', () => {
                    document.getElementById('loader').style.display = 'none';
                }, { once: true });

                if (fgPromise) {
                    fgPromise.catch((err) => {
                        console.warn('Video play failed:', err);
                        showClownMessage();  // fallback: only fires if video refuses to start at all
                    });
                }

                if (isMobile && navigator.vibrate) {
                    navigator.vibrate([0, 200, 80, 200, 80, 400]);
                }
            }, 200);

            // ------------- End detection -------------
            // Primary: `ended` fires when the video actually finishes playing.
            // This is what we want — user sees the FULL scare before the
            // clown message, no matter how long the video took to buffer.
            scareVideo.addEventListener('ended', showClownMessage, { once: true });

            // Fatal error fallback: fires if the video file is corrupt,
            // the codec is unsupported, or the connection drops hard.
            scareVideo.addEventListener('error', showClownMessage, { once: true });

            // Stall watchdog: only starts AFTER the video actually begins
            // playing (so buffering delays before playback don't count).
            // Each time playback resumes (initial start OR recovery from a
            // mid-video buffer stall), we recompute "how much of the video
            // is left" and set a timer for that + 5s grace. If the timer
            // fires, it means playback has been frozen for longer than the
            // remaining duration + 5s — treat as stalled, show the clown.
            let stallGuard = null;
            scareVideo.addEventListener('playing', () => {
                if (stallGuard) clearTimeout(stallGuard);
                const dur = isFinite(scareVideo.duration) ? scareVideo.duration : 60;
                const remainingMs = (dur - scareVideo.currentTime) * 1000 + 5000;
                stallGuard = setTimeout(showClownMessage, Math.max(remainingMs, 5000));
            });
            // Clear the watchdog when the video ends (redundant but clean)
            scareVideo.addEventListener('ended', () => {
                if (stallGuard) clearTimeout(stallGuard);
            });
        }

        // Discourage view-source curiosity
        document.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
